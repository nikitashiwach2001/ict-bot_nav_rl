seed: 42

# ── Models ────────────────────────────────────────────────────────────────────
models:
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [256, 256, 128]
        activations: relu
    output: ACTIONS

  critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: relu
    output: ONE

  critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: relu
    output: ONE

  target_critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: relu
    output: ONE

  target_critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: relu
    output: ONE

# ── Memory (replay buffer) ────────────────────────────────────────────────────
memory:
  class: RandomMemory
  memory_size: 100000

# ── Agent (SAC) ───────────────────────────────────────────────────────────────
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 128
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-4
  critic_learning_rate: 3.0e-4
  random_timesteps: 100
  learning_starts: 100
  grad_norm_clip: 0.5
  learn_entropy: true
  entropy_learning_rate: 3.0e-4
  initial_entropy_value: 1.0
  target_entropy: auto
  rewards_shaper_scale: 0.1
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: 78
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs:
    size: 1
  experiment:
    directory: ict_bot_nav
    experiment_name: sac
    write_interval: 100
    checkpoint_interval: 5000

# ── Trainer ───────────────────────────────────────────────────────────────────
trainer:
  class: SequentialTrainer
  timesteps: 500000
  environment_info: log
