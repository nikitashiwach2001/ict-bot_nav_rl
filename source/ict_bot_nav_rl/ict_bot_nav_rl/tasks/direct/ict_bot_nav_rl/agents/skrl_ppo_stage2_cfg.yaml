seed: 42

# IDENTICAL architecture to Stage 1 — required for weight loading.
# DO NOT change layer sizes when fine-tuning from Stage 1.
models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 128
  learning_epochs: 8
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4          # scratch training — same as Stage 1
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.015
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.02       # scratch training — explore freely
  value_loss_scale: 2.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.1      # balanced — collision -20 effective, waypoint +20 each
  time_limit_bootstrap: True
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  experiment:
    directory: ict_bot_nav_stage2
    experiment_name: ppo_stage2_scratch
    write_interval: 500
    checkpoint_interval: 2000

trainer:
  class: SequentialTrainer
  timesteps: 800000
  environment_info: log
