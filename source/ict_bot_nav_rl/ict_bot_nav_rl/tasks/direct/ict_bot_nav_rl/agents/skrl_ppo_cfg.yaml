seed: 42

# ── Models ────────────────────────────────────────────────────────────────────
# Matches the reference project: simple MLP [256, 128, 64] with ELU, no LayerNorm.
# clip_actions: False — Gaussian policy outputs are unbounded; PhysX velocity
# limits handle saturation at the hardware level.
models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

# ── Memory ────────────────────────────────────────────────────────────────────
memory:
  class: RandomMemory
  memory_size: -1   # automatically = rollouts

# ── Agent (PPO) ───────────────────────────────────────────────────────────────
agent:
  class: PPO
  rollouts: 128
  learning_epochs: 8
  mini_batches: 8
  discount_factor: 0.995
  lambda: 0.95
  learning_rate: 3.0e-4
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.015
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.02
  value_loss_scale: 2.0
  kl_threshold: 0.0
  # Scale rewards before feeding to PPO.
  # Effective reward = env_reward × rewards_shaper_scale.
  # e.g. goal_reached = 500 × 0.01 = 5.0 after scaling.
  rewards_shaper_scale: 0.1
  time_limit_bootstrap: True
  # null = auto-detect observation size from first batch
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  experiment:
    directory: ict_bot_nav
    experiment_name: ppo_v2
    write_interval: 500
    checkpoint_interval: 5000

# ── Trainer ───────────────────────────────────────────────────────────────────
trainer:
  class: SequentialTrainer
  timesteps: 500000
  environment_info: log
